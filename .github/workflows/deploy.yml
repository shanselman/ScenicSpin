name: Build, Test, and Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pr-smoke-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke checks
        run: npm run check

      - name: Build both sites
        run: npm run build:all

      - name: Test both sites
        run: npm run test:all
        env:
          CI: true

  test:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [pedalscape, beltscape]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build ${{ matrix.site }}
        run: node scripts/build.js ${{ matrix.site }}

      - name: Test ${{ matrix.site }}
        run: SITE=${{ matrix.site }} npx playwright test
        env:
          CI: true

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.site }}
          path: playwright-report/

  deploy:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        site: [pedalscape, beltscape]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build ${{ matrix.site }}
        run: node scripts/build.js ${{ matrix.site }}

      - name: Deploy to ${{ matrix.site }} repo
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          cd dist/${{ matrix.site }}
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy ${{ matrix.site }} from ${{ github.repository }}@${{ github.sha }}"
          git push --force \
            "https://x-access-token:${DEPLOY_TOKEN}@github.com/shanselman/${{ matrix.site }}.git" \
            HEAD:main
